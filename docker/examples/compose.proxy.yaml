services:
  # Docker Socket Proxy - see https://github.com/Tecnativa/docker-socket-proxy for official documentation
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: arcane-docker-proxy
    environment:
      - EVENTS=1
      - PING=1
      - VERSION=1
      # Security critical
      - AUTH=0
      - SECRETS=0
      - POST=1
      # Not always needed
      - BUILD=0
      - COMMIT=0
      - CONFIGS=0
      - CONTAINERS=1
      - DISTRIBUTION=0
      - EXEC=1
      - IMAGES=1
      - INFO=1
      - NETWORKS=1
      - NODES=0
      - PLUGINS=0
      - SERVICES=0
      - SESSION=0
      - SWARM=0
      - SYSTEM=0
      - TASKS=0
      - VOLUMES=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Read-only access to host socket
    networks:
      - arcane-internal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  arcane-migrator:
    image: ghcr.io/getarcaneapp/arcane:latest
    restart: "no"
    # To downgrade:
    # 1. Stop Arcane and back up the arcane-data volume.
    # 2. Set ARCANE_VERSION to the target version, for example v1.18.0.
    # 3. Comment out the `up` command and uncomment the `down` command.
    # 4. Run: docker compose run --rm arcane-migrator
    command:
      - migrate
      - up
    # command:
    #   - migrate
    #   - down
    #   - ${ARCANE_VERSION:?}
    volumes:
      - arcane-data:/app/data
    networks:
      - arcane-internal

  arcane:
    image: ghcr.io/getarcaneapp/arcane:${ARCANE_VERSION:-latest}
    container_name: arcane
    ports:
      - "3552:3552"
    volumes:
      - arcane-data:/app/data
    environment:
      - ENCRYPTION_KEY=xxxxxxxxxxxxxxxxxxxxxx
      - JWT_SECRET=xxxxxxxxxxxxxxxxxxxxxx
      # Optional: run Arcane as a specific host UID/GID instead of the default runtime user.
      # With DOCKER_HOST over TCP, no Unix socket group mapping is needed.
      # - PUID=1000
      # - PGID=1000
      - DOCKER_HOST=tcp://docker-socket-proxy:2375 # Use the proxy instead of direct socket
    networks:
      - arcane-internal
    depends_on:
      docker-socket-proxy:
        condition: service_started
      arcane-migrator:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:3552/api/health >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    # Use host cgroup namespace for better container self-detection
    # This allows Arcane to detect its own container ID more reliably
    cgroup: host
    restart: unless-stopped

networks:
  arcane-internal:
    driver: bridge
    name: arcane-internal

volumes:
  arcane-data:
    name: arcane-data
