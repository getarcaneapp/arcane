services:
  arcane-migrator:
    image: ghcr.io/getarcaneapp/arcane-headless:latest
    restart: "no"
    # To downgrade:
    # 1. Stop the agent and back up the agent-data volume.
    # 2. Set ARCANE_VERSION to the target version, for example v1.18.0.
    # 3. Comment out the `up` command and uncomment the `down` command.
    # 4. Run: docker compose run --rm arcane-migrator
    command:
      - migrate
      - up
    # command:
    #   - migrate
    #   - down
    #   - ${ARCANE_VERSION:?}
    volumes:
      - agent-data:/app/data

  arcane-agent:
    image: ghcr.io/getarcaneapp/arcane-headless:${ARCANE_VERSION:-latest}
    container_name: arcane-agent
    depends_on:
      arcane-migrator:
        condition: service_completed_successfully
    ports:
      - "3553:3553"
    environment:
      - AGENT_MODE=true
      - AGENT_TOKEN=arc_XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
      - MANAGER_API_URL=http://10.1.1.4:3552
      # Optional: run the agent as a specific host UID/GID instead of the default runtime user.
      # When using the mounted Docker socket, Arcane will map the socket group automatically.
      # - PUID=1000
      # - PGID=1000
      # Optional gRPC tunnel setting:
      - EDGE_TRANSPORT=websocket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent-data:/app/data
    # Use host cgroup namespace for better container self-detection
    # This allows Arcane to detect its own container ID more reliably
    cgroup: host
    restart: unless-stopped

volumes:
  agent-data:
