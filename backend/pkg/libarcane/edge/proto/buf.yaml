version: v2

modules:
  - path: .

lint:
  use:
    - STANDARD
  # Connect is a bidirectional transport envelope, so directional names are
  # clearer than unary-style ConnectRequest and ConnectResponse names.
  except:
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME

breaking:
  use:
    - FILE
