name: Release New Arcane Version

env:
  GOEXPERIMENT: jsonv2

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  attestations: write
  artifact-metadata: write
  id-token: write

jobs:
  release:
    runs-on: depot-ubuntu-latest

    env:
      MANAGER_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/arcane
      MANAGER_IMAGE_ALIAS: ghcr.io/${{ github.repository_owner }}/manager
      AGENT_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/arcane-headless
      AGENT_IMAGE_ALIAS: ghcr.io/${{ github.repository_owner }}/agent

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Just
        uses: extractions/setup-just@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Set up Depot CLI
        uses: depot/setup-action@v1

      - name: Setup depot buildx driver
        run: depot configure-docker

      - name: Login to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Frontend Dependencies
        run: just deps install frontend

      - name: Build Arcane Frontend
        run: just build single frontend

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: |
            backend/go.sum
            cli/go.sum

      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Capture frontend build versions
        id: frontend-versions
        run: |
          echo "node_version=$(node --version)" >> "$GITHUB_OUTPUT"
          echo "sveltekit_version=$(pnpm -C frontend exec node -p 'require("@sveltejs/kit/package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: '~> v2'
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.ARCANE_BOT_TOKEN }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          DISCORD_WEBHOOK_ID: ${{ secrets.DISCORD_WEBHOOK_ID }}
          DISCORD_WEBHOOK_TOKEN: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          NODE_VERSION: ${{ steps.frontend-versions.outputs.node_version }}
          SVELTEKIT_VERSION: ${{ steps.frontend-versions.outputs.sveltekit_version }}

      - name: Resolve image digests
        id: digests
        run: |
          echo "manager=$(docker buildx imagetools inspect "${MANAGER_IMAGE_NAME}:${{ github.ref_name }}" --format '{{ .Manifest.Digest }}')" >> "$GITHUB_OUTPUT"
          echo "agent=$(docker buildx imagetools inspect "${AGENT_IMAGE_NAME}:${{ github.ref_name }}" --format '{{ .Manifest.Digest }}')" >> "$GITHUB_OUTPUT"

      - name: Container image attestation (manager)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.MANAGER_IMAGE_NAME }}
          subject-digest: ${{ steps.digests.outputs.manager }}
          push-to-registry: true

      - name: Container image attestation (manager alias)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.MANAGER_IMAGE_ALIAS }}
          subject-digest: ${{ steps.digests.outputs.manager }}
          push-to-registry: true

      - name: Container image attestation (agent)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.AGENT_IMAGE_NAME }}
          subject-digest: ${{ steps.digests.outputs.agent }}
          push-to-registry: true

      - name: Container image attestation (agent alias)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.AGENT_IMAGE_ALIAS }}
          subject-digest: ${{ steps.digests.outputs.agent }}
          push-to-registry: true

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false
