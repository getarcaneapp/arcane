version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
    patterns: ["*"]
    cooldown:
      default-days: 2
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "17:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
    open-pull-requests-limit: 99
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "gomod"
    directory: "/backend"
    patterns: ["*"]
    cooldown:
      default-days: 2
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "17:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
    open-pull-requests-limit: 99
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      # docker/compose v5.1.4 imports github.com/moby/buildkit/util/tracing/env,
      # which is absent in buildkit v0.30+.
      - dependency-name: "github.com/moby/buildkit"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"

  - package-ecosystem: "gomod"
    directory: "/cli"
    patterns: ["*"]
    cooldown:
      default-days: 2
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "17:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
    open-pull-requests-limit: 99
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "gomod"
    directory: "/types"
    patterns: ["*"]
    cooldown:
      default-days: 2
    schedule:
